<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wetter-App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button
      id="lang-btn"
      type="button"
      aria-label="Sprache wechseln"
      style="position:absolute; top:15px; right:15px; z-index:1000; padding:8px 12px; border:1px solid rgba(255,255,255,0.16); border-radius:999px; background:rgba(255,255,255,0.12); color:#fff; cursor:pointer; backdrop-filter:blur(8px);"
    >
      AR / DE
    </button>

    <div class="app-shell">
      <header class="hero">
        <div class="hero-title">
          <div class="flag-badge" aria-label="Deutschland Flagge" title="Deutschland">
            <span class="flag-band black"></span>
            <span class="flag-band red"></span>
            <span class="flag-band gold"></span>
          </div>
          <div>
            <p class="eyebrow">LIVE-WETTER</p>
            <h1>Wetter in deiner Stadt</h1>
            <p id="subtitle" class="subtitle">Aktuelle Bedingungen und 7-Tage-Prognose auf Deutsch.</p>
          </div>
        </div>

        <form id="search-form" class="search-box">
          <input id="city-input" type="text" placeholder="Stadt eingeben" aria-label="Stadt suchen" />
          <button type="submit">Suchen</button>
        </form>
      </header>

      <section class="city-chips" aria-label="Beliebte Städte">
        <button type="button" class="city-chip" data-city="München">München</button>
        <button type="button" class="city-chip" data-city="Berlin">Berlin</button>
        <button type="button" class="city-chip" data-city="Köln">Köln</button>
        <button type="button" class="city-chip" data-city="Frankfurt">Frankfurt</button>
      </section>

      <main>
        <section id="status" class="status" aria-live="polite"></section>

        <section class="current-card">
          <div class="current-main">
            <p id="city-name" class="city-name">Berlin</p>
            <p id="current-date" class="date"></p>
            <div class="temp-row">
              <span id="current-temp" class="temperature">--</span>
              <span id="current-condition" class="condition">--</span>
            </div>
          </div>

          <div class="current-details">
            <div>
              <span id="feels-label" class="label">Gefühl</span>
              <strong id="feels-like">--</strong>
            </div>
            <div>
              <span id="wind-label" class="label">Wind</span>
              <strong id="wind-speed">--</strong>
            </div>
            <div>
              <span id="rain-label" class="label">Niederschlag</span>
              <strong id="precipitation">--</strong>
            </div>
          </div>
        </section>

        <section id="forecast" class="forecast-grid"></section>
      </main>
    </div>

    <footer style="text-align:center; padding:20px 10px 30px; color:#9fb0ca; font-size:0.95rem;">
      © 2026 husam ahmed
    </footer>

    <script src="script.js"></script>
  </body>
</html>
